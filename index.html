<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Linus Herrmann</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@500;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%;
      min-height: 100%;
      background: #ffffff;
      color: #2b2a26;
      font-family: 'Inter', -apple-system, 'Helvetica Neue', sans-serif;
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
    }

    body {
      min-height: 100vh;
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    /* Scenery wrapper — centered, fills viewport */
    .scene {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 0;
    }

    .scene svg {
      width: 100%;
      height: 100%;
      display: block;
    }

    /* Floating card */
    .card {
      position: fixed;
      top: clamp(20px, 4vw, 44px);
      left: clamp(20px, 4vw, 44px);
      z-index: 10;
      background: #fdfbf6;
      padding: clamp(20px, 2.6vw, 30px) clamp(24px, 3vw, 36px);
      border-radius: 4px;
      box-shadow:
        0 1px 0 rgba(0,0,0,0.04),
        0 8px 24px -8px rgba(60,50,40,0.18),
        0 24px 48px -16px rgba(60,50,40,0.22);
      max-width: min(360px, 86vw);
      transform: rotate(-1.2deg);
      border: 1px solid rgba(120,100,80,0.08);
    }

    .card::before {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      background:
        radial-gradient(120% 80% at 0% 0%, rgba(255,250,235,0.6), transparent 60%),
        radial-gradient(120% 80% at 100% 100%, rgba(230,220,200,0.18), transparent 60%);
      border-radius: inherit;
    }

    .card .name {
      font-family: 'Caveat', cursive;
      font-size: clamp(28px, 3.2vw, 38px);
      line-height: 1;
      color: #2b2a26;
      margin-bottom: 14px;
      letter-spacing: 0.5px;
    }

    .card .rule {
      width: 32px;
      height: 1px;
      background: #b9ad97;
      margin: 0 0 16px;
    }

    .card ul {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 9px;
    }

    .card li {
      font-size: clamp(12px, 1.05vw, 13.5px);
      color: #4a4640;
      letter-spacing: 0.2px;
      display: flex;
      align-items: center;
      gap: 10px;
      font-weight: 400;
    }

    .card li .label {
      width: 56px;
      color: #9a9082;
      text-transform: uppercase;
      font-size: 10px;
      letter-spacing: 1.6px;
      flex-shrink: 0;
    }

    .card a {
      color: inherit;
      text-decoration: none;
      border-bottom: 1px solid rgba(120,100,80,0.25);
      transition: border-color 0.2s ease, color 0.2s ease;
    }

    .card a:hover {
      color: #1a1815;
      border-bottom-color: rgba(60,50,40,0.7);
    }

    /* Animations */
    @keyframes drift {
      0%   { transform: translateX(-10vw); }
      100% { transform: translateX(110vw); }
    }
    @keyframes drift-slow {
      0%   { transform: translateX(-15vw); }
      100% { transform: translateX(115vw); }
    }

    @keyframes flap {
      0%, 100% { transform: scaleY(1); }
      50%      { transform: scaleY(0.55); }
    }

    @keyframes wave {
      0%   { transform: translateX(0); }
      100% { transform: translateX(-80px); }
    }

    @keyframes sway {
      0%, 100% { transform: rotate(-1.5deg); }
      50%      { transform: rotate(1.5deg); }
    }

    @keyframes shimmer {
      0%, 100% { opacity: 0.55; }
      50%      { opacity: 0.85; }
    }

    .cloud-1 { animation: drift-slow 80s linear infinite; }
    .cloud-2 { animation: drift 110s linear infinite; animation-delay: -40s; }
    .cloud-3 { animation: drift-slow 95s linear infinite; animation-delay: -65s; }

    .bird-flock-1 { animation: drift 38s linear infinite; animation-delay: -5s; }
    .bird-flock-2 { animation: drift-slow 55s linear infinite; animation-delay: -20s; }
    .bird-flock-3 { animation: drift 46s linear infinite; animation-delay: -32s; }

    .wing { animation: flap 0.45s ease-in-out infinite; transform-origin: center; transform-box: fill-box; }
    .wing.b { animation-duration: 0.5s; }
    .wing.c { animation-duration: 0.4s; }

    .water-wave { animation: wave 7s linear infinite; }
    .water-wave.slow { animation-duration: 11s; }
    .water-shimmer { animation: shimmer 3.5s ease-in-out infinite; }

    .grass-blade { transform-origin: bottom center; transform-box: fill-box; }
    .grass-blade.a { animation: sway 4.2s ease-in-out infinite; }
    .grass-blade.b { animation: sway 5.6s ease-in-out infinite; animation-delay: -1s; }
    .grass-blade.c { animation: sway 3.7s ease-in-out infinite; animation-delay: -2s; }

    /* Cows */
    .cow { transform-origin: center bottom; transform-box: fill-box; }
    .cow-a { animation: cow-shift-a 11s ease-in-out infinite; }
    .cow-b { animation: cow-shift-b 13s ease-in-out infinite; }

    @keyframes cow-shift-a {
      0%, 100% { transform: translateX(0); }
      50%      { transform: translateX(6px); }
    }
    @keyframes cow-shift-b {
      0%, 100% { transform: translateX(0); }
      50%      { transform: translateX(-7px); }
    }

    .cow-head { transform-box: fill-box; transform-origin: 100% 50%; }
    .cow-a .cow-head { animation: graze-a 6.5s ease-in-out infinite; }
    .cow-b .cow-head { animation: graze-b 7.5s ease-in-out infinite 1.2s; }

    /* negative rotation = snout pivots down toward grass (CSS positive = visual clockwise) */
    @keyframes graze-a {
      0%, 8%    { transform: rotate(0deg) translate(0,0); }
      14%, 70%  { transform: rotate(-38deg) translate(-2px, 6px); }
      74%, 78%  { transform: rotate(-34deg) translate(-2px, 5px); }
      82%, 100% { transform: rotate(0deg) translate(0,0); }
    }
    @keyframes graze-b {
      0%, 32%   { transform: rotate(0deg) translate(0,0); }
      38%, 92%  { transform: rotate(-38deg) translate(-2px, 6px); }
      96%, 100% { transform: rotate(0deg) translate(0,0); }
    }

    .cow-tail { transform-box: fill-box; transform-origin: 0% 0%; }
    .cow-a .cow-tail { animation: tail-a 2.8s ease-in-out infinite; }
    .cow-b .cow-tail { animation: tail-b 3.4s ease-in-out infinite; }

    @keyframes tail-a {
      0%, 100% { transform: rotate(-6deg); }
      50%      { transform: rotate(10deg); }
    }
    @keyframes tail-b {
      0%, 100% { transform: rotate(8deg); }
      50%      { transform: rotate(-8deg); }
    }

    /* Goat */
    .goat { transform-box: fill-box; transform-origin: center bottom; animation: goat-bob 5.5s ease-in-out infinite; }
    @keyframes goat-bob {
      0%, 100% { transform: translateY(0); }
      50%      { transform: translateY(-1.5px); }
    }

    .goat-head { transform-box: fill-box; transform-origin: 100% 50%; animation: goat-look 9s ease-in-out infinite 0.6s; }
    @keyframes goat-look {
      0%, 25%   { transform: rotate(0deg); }
      32%, 50%  { transform: rotate(-22deg); }   /* head up, ears alert */
      57%, 72%  { transform: rotate(0deg); }
      80%, 92%  { transform: rotate(10deg); }    /* small nibble down */
      100%      { transform: rotate(0deg); }
    }

    .goat-tail { transform-box: fill-box; transform-origin: 0% 100%; animation: goat-tail 2.4s ease-in-out infinite; }
    @keyframes goat-tail {
      0%, 100% { transform: rotate(-15deg); }
      50%      { transform: rotate(20deg); }
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.001ms !important;
        animation-iteration-count: 1 !important;
      }
    }
  </style>
</head>
<body>

  <aside class="card" aria-label="Contact card">
    <div class="name">Linus Herrmann</div>
    <div class="rule"></div>
    <ul>
      <li><span class="label">Email</span><a href="mailto:developer@linusherrmann.ch">developer@linusherrmann.ch</a></li>
      <li><span class="label">Role</span>AI Engineer</li>
      <li><span class="label">Place</span>Germany</li>
    </ul>
  </aside>

  <div class="scene" aria-hidden="true">
    <svg viewBox="0 0 1600 900" preserveAspectRatio="xMidYMax slice">
      <defs>
        <filter id="paint" x="-2%" y="-2%" width="104%" height="104%">
          <feTurbulence type="fractalNoise" baseFrequency="0.018" numOctaves="2" seed="3" result="noise"/>
          <feDisplacementMap in="SourceGraphic" in2="noise" scale="3"/>
        </filter>

        <filter id="paint-soft" x="-2%" y="-2%" width="104%" height="104%">
          <feTurbulence type="fractalNoise" baseFrequency="0.012" numOctaves="2" seed="7" result="noise"/>
          <feDisplacementMap in="SourceGraphic" in2="noise" scale="2"/>
        </filter>

        <filter id="grain">
          <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" seed="2"/>
          <feColorMatrix values="0 0 0 0 0.55  0 0 0 0 0.5  0 0 0 0 0.42  0 0 0 0.06 0"/>
          <feComposite in2="SourceGraphic" operator="in"/>
        </filter>

        <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%"  stop-color="#ffffff"/>
          <stop offset="50%" stop-color="#ffffff"/>
          <stop offset="78%" stop-color="#f3edde"/>
          <stop offset="100%" stop-color="#ead7b3" stop-opacity="0.55"/>
        </linearGradient>

        <linearGradient id="mtnFar" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#b9c4d1"/>
          <stop offset="100%" stop-color="#9caab9"/>
        </linearGradient>

        <linearGradient id="mtnMid" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#7e95a5"/>
          <stop offset="100%" stop-color="#5c7585"/>
        </linearGradient>

        <linearGradient id="mtnNear" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#5b6e6a"/>
          <stop offset="100%" stop-color="#3f524d"/>
        </linearGradient>

        <linearGradient id="snow" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#fbfaf6"/>
          <stop offset="100%" stop-color="#e6ddc8"/>
        </linearGradient>

        <linearGradient id="meadow" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#a6c187"/>
          <stop offset="60%" stop-color="#82a766"/>
          <stop offset="100%" stop-color="#688f4f"/>
        </linearGradient>

        <linearGradient id="meadowFront" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#8fb86c"/>
          <stop offset="55%" stop-color="#6f9750"/>
          <stop offset="100%" stop-color="#4d6f37"/>
        </linearGradient>

        <linearGradient id="water" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#bcd6e3"/>
          <stop offset="100%" stop-color="#7aa0b6"/>
        </linearGradient>

        <radialGradient id="sunGlow" cx="50%" cy="50%" r="50%">
          <stop offset="0%"   stop-color="#fff1c2" stop-opacity="0.85"/>
          <stop offset="60%"  stop-color="#fff1c2" stop-opacity="0.15"/>
          <stop offset="100%" stop-color="#fff1c2" stop-opacity="0"/>
        </radialGradient>

        <symbol id="bird" viewBox="-20 -10 40 20" overflow="visible">
          <g>
            <path class="wing a" d="M -16 0 Q -8 -8 0 0" stroke="#3a3a3a" stroke-width="1.6" fill="none" stroke-linecap="round"/>
            <path class="wing a" d="M 0 0 Q 8 -8 16 0" stroke="#3a3a3a" stroke-width="1.6" fill="none" stroke-linecap="round"/>
          </g>
        </symbol>

        <symbol id="bird-b" viewBox="-20 -10 40 20" overflow="visible">
          <g>
            <path class="wing b" d="M -14 0 Q -7 -7 0 0" stroke="#2e2e2e" stroke-width="1.4" fill="none" stroke-linecap="round"/>
            <path class="wing b" d="M 0 0 Q 7 -7 14 0" stroke="#2e2e2e" stroke-width="1.4" fill="none" stroke-linecap="round"/>
          </g>
        </symbol>

        <symbol id="bird-c" viewBox="-20 -10 40 20" overflow="visible">
          <g>
            <path class="wing c" d="M -12 0 Q -6 -6 0 0" stroke="#3a3a3a" stroke-width="1.2" fill="none" stroke-linecap="round"/>
            <path class="wing c" d="M 0 0 Q 6 -6 12 0" stroke="#3a3a3a" stroke-width="1.2" fill="none" stroke-linecap="round"/>
          </g>
        </symbol>

        <symbol id="cloud" viewBox="0 0 200 70" overflow="visible">
          <g filter="url(#paint-soft)" opacity="0.85">
            <ellipse cx="50"  cy="40" rx="40" ry="22" fill="#ffffff"/>
            <ellipse cx="95"  cy="32" rx="48" ry="26" fill="#ffffff"/>
            <ellipse cx="140" cy="40" rx="40" ry="22" fill="#ffffff"/>
            <ellipse cx="170" cy="44" rx="26" ry="16" fill="#ffffff"/>
          </g>
          <g opacity="0.25">
            <ellipse cx="60"  cy="50" rx="30" ry="8" fill="#c9c2b1"/>
            <ellipse cx="120" cy="52" rx="40" ry="8" fill="#c9c2b1"/>
          </g>
        </symbol>
      </defs>

      <!-- Sky wash -->
      <rect x="0" y="0" width="1600" height="900" fill="url(#sky)"/>

      <!-- Sun -->
      <circle cx="1140" cy="240" r="200" fill="url(#sunGlow)"/>
      <circle cx="1140" cy="240" r="52"  fill="#fff4d2" opacity="0.95"/>
      <circle cx="1140" cy="240" r="40"  fill="#ffe9a8" opacity="0.85"/>

      <!-- Clouds -->
      <g class="cloud-1" style="opacity:0.9">
        <use href="#cloud" x="0" y="80"  width="260" height="90"/>
      </g>
      <g class="cloud-2" style="opacity:0.85">
        <use href="#cloud" x="0" y="150" width="320" height="110"/>
      </g>
      <g class="cloud-3" style="opacity:0.8">
        <use href="#cloud" x="0" y="60"  width="200" height="70"/>
      </g>

      <!-- Far mountains -->
      <g filter="url(#paint-soft)">
        <path fill="url(#mtnFar)" opacity="0.85"
          d="M -50 470
             L 120 380 L 220 420 L 340 320 L 460 400 L 560 340
             L 700 420 L 820 350 L 960 430 L 1100 360 L 1240 440
             L 1380 370 L 1520 430 L 1650 390 L 1650 600 L -50 600 Z"/>
      </g>

      <!-- Mid mountains with snow caps -->
      <g filter="url(#paint)">
        <path fill="url(#mtnMid)"
          d="M -50 540
             L 80 440 L 160 490 L 260 370 L 360 460 L 450 400
             L 560 490 L 680 360 L 800 480 L 920 390 L 1060 500
             L 1180 410 L 1300 490 L 1430 400 L 1560 500 L 1650 460
             L 1650 660 L -50 660 Z"/>

        <path fill="url(#snow)" opacity="0.95"
          d="M 240 390 L 260 370 L 285 400 L 275 405 L 268 398 L 258 406 Z"/>
        <path fill="url(#snow)" opacity="0.95"
          d="M 660 390 L 680 360 L 710 395 L 695 402 L 686 393 L 676 402 Z"/>
        <path fill="url(#snow)" opacity="0.95"
          d="M 1040 520 L 1060 500 L 1085 525 L 1072 532 L 1063 522 L 1053 532 Z"/>
        <path fill="url(#snow)" opacity="0.95"
          d="M 1410 420 L 1430 400 L 1458 428 L 1444 435 L 1435 424 L 1425 434 Z"/>

        <path stroke="#a8b8c5" stroke-width="1.2" fill="none" opacity="0.45"
          d="M 80 440 L 160 490 M 360 460 L 450 400 M 560 490 L 680 360 M 920 390 L 1060 500"/>
      </g>

      <!-- Near hills -->
      <g filter="url(#paint)">
        <path fill="url(#mtnNear)"
          d="M -50 600
             L 100 540 L 230 580 L 360 520 L 500 580 L 640 530
             L 800 600 L 960 540 L 1120 600 L 1280 550 L 1430 600 L 1560 560 L 1650 590
             L 1650 720 L -50 720 Z"/>
      </g>

      <!-- Mid-distance meadow strip -->
      <g filter="url(#paint-soft)">
        <path fill="url(#meadow)"
          d="M -50 640
             L 60 624 L 220 642 L 380 624 L 540 644 L 720 626
             L 900 644 L 1080 624 L 1260 644 L 1440 626 L 1600 644 L 1650 634
             L 1650 720 L -50 720 Z"/>
      </g>

      <!-- Stream / water (mid-distance) -->
      <g>
        <path fill="url(#water)" filter="url(#paint-soft)"
          d="M -20 700
             C 200 686, 400 720, 620 702
             C 820 686, 1000 724, 1200 706
             C 1380 692, 1520 722, 1650 706
             L 1650 740 L -20 740 Z"/>

        <g class="water-wave water-shimmer" style="opacity:0.6">
          <path stroke="#ffffff" stroke-width="1.2" fill="none" opacity="0.7"
                d="M -100 712 q 20 -3 40 0 t 40 0 t 40 0 t 40 0 t 40 0 t 40 0 t 40 0 t 40 0 t 40 0 t 40 0 t 40 0 t 40 0 t 40 0 t 40 0 t 40 0 t 40 0 t 40 0 t 40 0 t 40 0 t 40 0 t 40 0 t 40 0"/>
        </g>
        <g class="water-wave slow" style="opacity:0.5">
          <path stroke="#ffffff" stroke-width="0.9" fill="none"
                d="M -100 728 q 20 -3 40 0 t 40 0 t 40 0 t 40 0 t 40 0 t 40 0 t 40 0 t 40 0 t 40 0 t 40 0 t 40 0 t 40 0 t 40 0 t 40 0 t 40 0 t 40 0 t 40 0 t 40 0 t 40 0 t 40 0 t 40 0 t 40 0"/>
        </g>

        <path fill="#3f5e3a" opacity="0.4" filter="url(#paint-soft)"
              d="M -20 698 C 200 684, 400 718, 620 700 C 820 684, 1000 722, 1200 704 C 1380 690, 1520 720, 1650 704 L 1650 710 L -20 710 Z"/>
      </g>

      <!-- Foreground meadow — deep, rolling -->
      <g filter="url(#paint-soft)">
        <path fill="url(#meadowFront)"
          d="M -50 740
             C 160 720, 320 758, 520 736
             C 720 716, 900 760, 1080 738
             C 1260 720, 1440 760, 1650 740
             L 1650 900 L -50 900 Z"/>

        <!-- soft shadow band for depth -->
        <path fill="#3f5a2a" opacity="0.18"
          d="M -50 770
             C 200 755, 420 790, 640 770
             C 820 755, 1020 795, 1240 772
             C 1420 760, 1560 790, 1650 776
             L 1650 800 L -50 800 Z"/>
      </g>

      <!-- Trees on the hills -->
      <g filter="url(#paint-soft)">
        <rect x="1338" y="610" width="4" height="22" fill="#5a3f24"/>
        <path d="M 1340 580 l -16 28 l 32 0 z M 1340 595 l -20 32 l 40 0 z" fill="#3f5a32"/>
      </g>
      <g filter="url(#paint-soft)">
        <rect x="232" y="618" width="3" height="18" fill="#5a3f24"/>
        <path d="M 233 595 l -12 22 l 24 0 z M 233 605 l -16 24 l 32 0 z" fill="#3f5a32"/>
      </g>
      <g filter="url(#paint-soft)">
        <rect x="500" y="612" width="3" height="18" fill="#5a3f24"/>
        <path d="M 501 590 l -10 20 l 20 0 z M 501 600 l -14 22 l 28 0 z" fill="#3f5a32"/>
      </g>

      <!-- ===== Cows ===== -->

      <!-- Cow A — left of center, faces left, slowly grazes -->
      <!-- Outer <g>: positioning via SVG attribute (immune to CSS transform overrides). -->
      <!-- Inner <g class="cow cow-a">: animated body shift via CSS. -->
      <g transform="translate(640 808)">
        <g class="cow cow-a">
          <g filter="url(#paint-soft)">
            <!-- shadow -->
            <ellipse cx="0" cy="44" rx="58" ry="6" fill="#2b2a26" opacity="0.18"/>

            <!-- legs -->
            <rect x="-30" y="18" width="7" height="26" rx="2" fill="#2b2a26"/>
            <rect x="-14" y="20" width="7" height="24" rx="2" fill="#2b2a26"/>
            <rect x="10"  y="20" width="7" height="24" rx="2" fill="#2b2a26"/>
            <rect x="26"  y="18" width="7" height="26" rx="2" fill="#2b2a26"/>

            <!-- body -->
            <ellipse cx="0" cy="0" rx="46" ry="22" fill="#fdfaf2" stroke="#2b2a26" stroke-width="2.2"/>

            <path d="M 14 -2 q 10 -4 18 2 q 4 6 -4 12 q -10 2 -16 -2 q -4 -6 2 -12 z" fill="#2b2a26"/>
            <path d="M -8 6 q 6 -2 10 0 q 2 4 -2 8 q -8 2 -10 -2 q -2 -3 2 -6 z" fill="#2b2a26"/>

            <!-- udder -->
            <ellipse cx="6" cy="20" rx="6" ry="4" fill="#f0c2b6"/>

            <!-- tail: outer wraps positioning, inner is animated -->
            <g transform="translate(46 -8)">
              <g class="cow-tail">
                <path d="M 0 0 q 10 6 6 22" stroke="#2b2a26" stroke-width="2.4" fill="none" stroke-linecap="round"/>
                <circle cx="6" cy="22" r="3" fill="#2b2a26"/>
              </g>
            </g>

            <!-- head: outer wraps positioning, inner is animated; pivots from right edge (neck) -->
            <g transform="translate(-58 -4)">
              <g class="cow-head">
                <path d="M 6 -10 q -4 -10 -10 -6"   stroke="#2b2a26" stroke-width="2"   fill="#fdfaf2"/>
                <path d="M -2 -12 q -3 -8 -10 -4"   stroke="#2b2a26" stroke-width="1.8" fill="#fdfaf2"/>
                <path d="M 0 -10 q 1 -5 5 -6"       stroke="#caa97a" stroke-width="2"   fill="none" stroke-linecap="round"/>
                <ellipse cx="0"  cy="0"  rx="16" ry="13" fill="#fdfaf2" stroke="#2b2a26" stroke-width="2"/>
                <ellipse cx="-10" cy="3" rx="8"  ry="6"  fill="#f3d2c2" stroke="#2b2a26" stroke-width="1.6"/>
                <ellipse cx="-13" cy="2" rx="0.9" ry="1.4" fill="#2b2a26"/>
                <ellipse cx="-13" cy="6" rx="0.9" ry="1.4" fill="#2b2a26"/>
                <circle cx="-4" cy="-3" r="1.4" fill="#2b2a26"/>
              </g>
            </g>
          </g>
        </g>
      </g>

      <!-- Cow B — right of center, slightly smaller (further), faces right -->
      <g transform="translate(980 838) scale(0.86)">
        <g class="cow cow-b">
          <g filter="url(#paint-soft)">
            <ellipse cx="0" cy="44" rx="58" ry="6" fill="#2b2a26" opacity="0.18"/>

            <rect x="-30" y="18" width="7" height="26" rx="2" fill="#2b2a26"/>
            <rect x="-14" y="20" width="7" height="24" rx="2" fill="#2b2a26"/>
            <rect x="10"  y="20" width="7" height="24" rx="2" fill="#2b2a26"/>
            <rect x="26"  y="18" width="7" height="26" rx="2" fill="#2b2a26"/>

            <ellipse cx="0" cy="0" rx="46" ry="22" fill="#fdfaf2" stroke="#2b2a26" stroke-width="2.2"/>
            <path d="M -22 0 q 6 -8 16 -4 q 6 6 0 12 q -10 4 -18 -2 q -4 -4 2 -6 z" fill="#2b2a26"/>
            <path d="M 16 -10 q 8 -4 16 2 q 6 6 -2 12 q -10 4 -16 -2 q -4 -6 2 -12 z" fill="#2b2a26"/>
            <path d="M -2 8 q 6 -2 10 0 q 2 4 -2 8 q -8 2 -10 -2 q -2 -3 2 -6 z" fill="#2b2a26"/>

            <ellipse cx="-6" cy="20" rx="6" ry="4" fill="#f0c2b6"/>

            <!-- tail on left side; mirror lives on the positioning wrapper, animation on inner -->
            <g transform="translate(-46 -8) scale(-1 1)">
              <g class="cow-tail">
                <path d="M 0 0 q 10 6 6 22" stroke="#2b2a26" stroke-width="2.4" fill="none" stroke-linecap="round"/>
                <circle cx="6" cy="22" r="3" fill="#2b2a26"/>
              </g>
            </g>

            <!-- head on right side; parent mirror handles visual flip, child rotation matches cow-a -->
            <g transform="translate(58 -4) scale(-1 1)">
              <g class="cow-head">
                <path d="M 6 -10 q -4 -10 -10 -6"   stroke="#2b2a26" stroke-width="2"   fill="#fdfaf2"/>
                <path d="M -2 -12 q -3 -8 -10 -4"   stroke="#2b2a26" stroke-width="1.8" fill="#fdfaf2"/>
                <path d="M 0 -10 q 1 -5 5 -6"       stroke="#caa97a" stroke-width="2"   fill="none" stroke-linecap="round"/>
                <ellipse cx="0"  cy="0"  rx="16" ry="13" fill="#fdfaf2" stroke="#2b2a26" stroke-width="2"/>
                <ellipse cx="-10" cy="3" rx="8"  ry="6"  fill="#f3d2c2" stroke="#2b2a26" stroke-width="1.6"/>
                <ellipse cx="-13" cy="2" rx="0.9" ry="1.4" fill="#2b2a26"/>
                <ellipse cx="-13" cy="6" rx="0.9" ry="1.4" fill="#2b2a26"/>
                <circle cx="-4" cy="-3" r="1.4" fill="#2b2a26"/>
              </g>
            </g>
          </g>
        </g>
      </g>

      <!-- Goat — left foreground, smaller, looks around -->
      <g transform="translate(290 866) scale(0.82)">
        <g class="goat">
          <g filter="url(#paint-soft)">
            <!-- shadow -->
            <ellipse cx="0" cy="34" rx="42" ry="5" fill="#2b2a26" opacity="0.18"/>

            <!-- legs (thinner than cow) -->
            <rect x="-22" y="14" width="5" height="22" rx="1.5" fill="#3a2e22"/>
            <rect x="-10" y="16" width="5" height="20" rx="1.5" fill="#3a2e22"/>
            <rect x="6"   y="16" width="5" height="20" rx="1.5" fill="#3a2e22"/>
            <rect x="18"  y="14" width="5" height="22" rx="1.5" fill="#3a2e22"/>

            <!-- body (smaller, cream with brown patches) -->
            <ellipse cx="0" cy="0" rx="34" ry="16" fill="#efe6d3" stroke="#3a2e22" stroke-width="2"/>
            <path d="M -16 -10 q 14 -4 24 0 q 4 4 -4 8 q -16 4 -22 -2 q -6 -4 2 -6 z" fill="#a07a52"/>
            <path d="M 10 4 q 6 -2 12 0 q 2 4 -4 6 q -8 0 -10 -2 q -2 -2 2 -4 z" fill="#a07a52"/>

            <!-- short upward tail; positioning wrapper, animated child -->
            <g transform="translate(34 -6)">
              <g class="goat-tail">
                <path d="M 0 0 q 6 -8 8 -1" stroke="#3a2e22" stroke-width="2.4" fill="none" stroke-linecap="round"/>
              </g>
            </g>

            <!-- head: positioning wrapper, animated child; pivots from neck (right edge) -->
            <g transform="translate(-38 -8)">
              <g class="goat-head">
                <!-- horns: two curved, swept-back -->
                <path d="M 4 -10 q 4 -10 10 -8" stroke="#3a2e22" stroke-width="2.6" fill="none" stroke-linecap="round"/>
                <path d="M 0 -11 q 2 -8 6 -8"   stroke="#3a2e22" stroke-width="2"   fill="none" stroke-linecap="round"/>

                <!-- ear -->
                <path d="M 6 -6 q 6 -2 8 4 q -4 2 -8 0 z" fill="#efe6d3" stroke="#3a2e22" stroke-width="1.4"/>

                <!-- head (narrower, more elongated than cow) -->
                <ellipse cx="0" cy="0" rx="13" ry="9" fill="#efe6d3" stroke="#3a2e22" stroke-width="1.8"/>

                <!-- snout -->
                <ellipse cx="-9" cy="2" rx="6" ry="4" fill="#fdfaf2" stroke="#3a2e22" stroke-width="1.4"/>

                <!-- beard (signature goat) -->
                <path d="M -10 6 q -1 8 -2 12 q 3 -1 5 -1 q 0 -5 -1 -10 z" fill="#fdfaf2" stroke="#3a2e22" stroke-width="1.2"/>

                <!-- eye + nostril -->
                <circle cx="-3" cy="-3" r="1.3" fill="#2b2a26"/>
                <ellipse cx="-12" cy="2" rx="0.7" ry="1.1" fill="#2b2a26"/>
              </g>
            </g>
          </g>
        </g>
      </g>

      <!-- Grass blades (denser, foreground) -->
      <g stroke="#3d5a2a" stroke-width="1.6" stroke-linecap="round" fill="none" opacity="0.85">
        <!-- back row near stream bank -->
        <path class="grass-blade a" d="M  60 758 q -2 -12 4 -22"/>
        <path class="grass-blade b" d="M 180 760 q  2 -10 -3 -20"/>
        <path class="grass-blade c" d="M 300 758 q -2 -14 4 -22"/>
        <path class="grass-blade a" d="M 430 760 q  2 -12 -3 -22"/>
        <path class="grass-blade b" d="M 670 758 q -2 -14 4 -22"/>
        <path class="grass-blade c" d="M 820 760 q  2 -12 -3 -22"/>
        <path class="grass-blade a" d="M 980 760 q -2 -14 4 -22"/>
        <path class="grass-blade b" d="M 1180 760 q 2 -12 -3 -22"/>
        <path class="grass-blade c" d="M 1340 758 q -2 -14 4 -22"/>
        <path class="grass-blade a" d="M 1500 760 q 2 -12 -3 -22"/>

        <!-- mid row -->
        <path class="grass-blade a" d="M  100 818 q -2 -16 4 -28"/>
        <path class="grass-blade b" d="M  240 820 q  2 -14 -3 -24"/>
        <path class="grass-blade c" d="M  400 822 q -2 -18 4 -30"/>
        <path class="grass-blade a" d="M  720 820 q  2 -16 -3 -28"/>
        <path class="grass-blade b" d="M  900 822 q -2 -18 4 -30"/>
        <path class="grass-blade c" d="M 1240 820 q  2 -14 -3 -24"/>
        <path class="grass-blade a" d="M 1420 822 q -2 -18 4 -30"/>

        <!-- front row -->
        <path class="grass-blade a" d="M  40  882 q -2 -22 5 -36"/>
        <path class="grass-blade b" d="M  160 884 q  3 -20 -4 -34"/>
        <path class="grass-blade c" d="M  280 882 q -3 -24 5 -38"/>
        <path class="grass-blade a" d="M  380 884 q  3 -22 -4 -36"/>
        <path class="grass-blade b" d="M  640 884 q -3 -22 5 -36"/>
        <path class="grass-blade c" d="M  780 882 q  3 -24 -4 -38"/>
        <path class="grass-blade a" d="M  860 884 q -3 -20 5 -34"/>
        <path class="grass-blade b" d="M 1240 884 q -3 -22 5 -36"/>
        <path class="grass-blade c" d="M 1360 882 q  3 -24 -4 -38"/>
        <path class="grass-blade a" d="M 1480 884 q -3 -20 5 -34"/>
        <path class="grass-blade b" d="M 1560 882 q  3 -22 -4 -36"/>
      </g>

      <!-- Wildflowers across the meadow -->
      <g opacity="0.9">
        <circle cx="120"  cy="876" r="2.6" fill="#f6c945"/>
        <circle cx="220"  cy="864" r="2.4" fill="#f1f1f1"/>
        <circle cx="340"  cy="880" r="2.6" fill="#e89bc6"/>
        <circle cx="430"  cy="858" r="2.2" fill="#f6c945"/>
        <circle cx="690"  cy="878" r="2.6" fill="#f1f1f1"/>
        <circle cx="820"  cy="866" r="2.4" fill="#e89bc6"/>
        <circle cx="950"  cy="876" r="2.6" fill="#f6c945"/>
        <circle cx="1240" cy="864" r="2.4" fill="#f1f1f1"/>
        <circle cx="1360" cy="880" r="2.6" fill="#e89bc6"/>
        <circle cx="1480" cy="858" r="2.2" fill="#f6c945"/>
        <circle cx="1560" cy="876" r="2.4" fill="#f1f1f1"/>
      </g>

      <!-- Bird flocks -->
      <g class="bird-flock-1">
        <use href="#bird"   x="0"  y="160" width="34" height="17"/>
        <use href="#bird-b" x="40" y="175" width="26" height="13"/>
        <use href="#bird-c" x="72" y="168" width="22" height="11"/>
      </g>

      <g class="bird-flock-2">
        <use href="#bird"   x="0"  y="280" width="28" height="14"/>
        <use href="#bird-b" x="32" y="292" width="22" height="11"/>
      </g>

      <g class="bird-flock-3">
        <use href="#bird-c" x="0"  y="100" width="20" height="10"/>
        <use href="#bird"   x="28" y="110" width="26" height="13"/>
        <use href="#bird-b" x="60" y="102" width="22" height="11"/>
        <use href="#bird-c" x="88" y="116" width="18" height="9"/>
      </g>

      <!-- Paper grain over the whole scene -->
      <rect x="0" y="0" width="1600" height="900" filter="url(#grain)" opacity="0.5"/>
    </svg>
  </div>
